name: Publish package to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish, matching package.json (example: 0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Require main branch
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "This workflow must run from main. Current ref: $GITHUB_REF"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate requested version
        id: version
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          requested_version="${{ inputs.version }}"
          tag_name="v$package_version"

          if [ "$package_version" != "$requested_version" ]; then
            echo "Requested version $requested_version does not match package.json version $package_version."
            exit 1
          fi

          if npm view "$package_name@$package_version" version --registry=https://registry.npmjs.org >/tmp/npm-published-version 2>/dev/null; then
            already_published=true
            echo "$package_name@$package_version is already published to npm. Continuing so tag/release state can be reconciled."
          else
            already_published=false
          fi

          echo "Validated $package_name@$package_version for publication."
          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "target_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "already_published=$already_published" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.version.outputs.already_published != 'true'
        run: npm publish

      - name: Ensure release tag
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          TARGET_SHA: ${{ steps.version.outputs.target_sha }}
        run: |
          git fetch --force --tags origin

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            tagged_commit="$(git rev-parse "$TAG_NAME^{commit}")"
            if [ "$tagged_commit" != "$TARGET_SHA" ]; then
              echo "Existing tag $TAG_NAME points to $tagged_commit, expected $TARGET_SHA."
              exit 1
            fi

            echo "Tag $TAG_NAME already exists at $tagged_commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG_NAME" "$TARGET_SHA" -m "Release $TAG_NAME"
            git push origin "refs/tags/$TAG_NAME"
            echo "Created tag $TAG_NAME at $TARGET_SHA."
          fi

      - name: Ensure GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        run: |
          if release_url="$(gh release view "$TAG_NAME" --json url --jq '.url' 2>/dev/null)"; then
            echo "Release $TAG_NAME already exists: $release_url"
          else
            gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes
            release_url="$(gh release view "$TAG_NAME" --json url --jq '.url')"
            echo "Created release $TAG_NAME: $release_url"
          fi

          {
            echo "## npm publish result"
            if [ "${{ steps.version.outputs.already_published }}" = "true" ]; then
              echo "- npm package already existed for \`${{ steps.version.outputs.package_name }}@${{ steps.version.outputs.package_version }}\`; skipped duplicate publish."
            else
              echo "- Published \`${{ steps.version.outputs.package_name }}@${{ steps.version.outputs.package_version }}\` to npm."
            fi
            echo "- Verified tag \`${TAG_NAME}\` on commit \`${{ steps.version.outputs.target_sha }}\`."
            echo "- Verified GitHub Release: ${release_url}"
          } >> "$GITHUB_STEP_SUMMARY"
